name: Actuator PID verification
scenarios:
  - name: step_small
    setpoint: 0.5
    duration: 3.0
    dt: 0.001
  - name: step_1rad
    setpoint: 1.0
    duration: 3.0
    dt: 0.001
requirements:
  - id: REQ-1
    description: steady-state error below 2 %
    metric: steady_state_error
    max: 0.02
  - id: REQ-2
    description: overshoot below 30 %
    metric: overshoot_pct
    max: 30.0
  - id: REQ-3
    description: rise time (10-90 %) under 0.5 s
    metric: rise_time_s
    max: 0.5
  - id: REQ-4
    description: settles into the 2 % band within 1.5 s
    metric: settling_time_s
    max: 1.5
